<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LUXE MEMOIR | CHRONOLOGICAL CHIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        body { background-color: #F8F6F0; font-family: 'Inter', sans-serif; }
        .kitap-ic-sayfalar { width: 95vw; height: 85vh; display: flex; margin: 20px auto; background: #FCFAF5; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        @media (max-width: 768px) { .kitap-ic-sayfalar { flex-direction: column; height: 95vh; } .sol-sayfa, .sag-sayfa { width: 100% !important; height: 50%; overflow-y: auto; padding: 20px !important; } }
        .sol-sayfa, .sag-sayfa { width: 50%; padding: 40px; overflow-y: auto; }
        .sablon-tablo { width: 100%; border-collapse: collapse; font-size: 10px; }
        .sablon-tablo td, .sablon-tablo th { border: 1px solid #EBE4D5; padding: 4px; }
    </style>
</head>
<body>
    <div id="swipeArea" class="kitap-ic-sayfalar">
        <div class="sol-sayfa border-r">
            <h2 id="ustBaslikSol" contenteditable="true" class="text-2xl font-serif italic">Sol Sayfa</h2>
            <div id="editorSol" contenteditable="true" class="mt-4 min-h-[200px]"></div>
        </div>
        <div class="sag-sayfa">
            <h2 id="ustBaslikSag" contenteditable="true" class="text-2xl font-serif italic">Sağ Sayfa</h2>
            <div id="editorSag" contenteditable="true" class="mt-4 min-h-[200px]"></div>
        </div>
    </div>

    <script>
        let currentPagePair = 1;
        const mc = new Hammer(document.getElementById('swipeArea'));
        mc.on("swipeleft", () => { savePage(); currentPagePair++; loadPage(); });
        mc.on("swiperight", () => { if(currentPagePair > 1) { savePage(); currentPagePair--; loadPage(); } });

        function savePage() {
            localStorage.setItem(`p_${currentPagePair}_l`, document.getElementById('editorSol').innerHTML);
            localStorage.setItem(`p_${currentPagePair}_r`, document.getElementById('editorSag').innerHTML);
        }
        function loadPage() {
            document.getElementById('editorSol').innerHTML = localStorage.getItem(`p_${currentPagePair}_l`) || "Sol içerik...";
            document.getElementById('editorSag').innerHTML = localStorage.getItem(`p_${currentPagePair}_r`) || "Sağ içerik...";
        }
        window.onload = loadPage;
    </script>
</body>
</html>
