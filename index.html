<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LUXE MEMOIR | CHRONOLOGICAL CHIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        krem: '#FCFAF5',
                        bej: '#F5F0E6',
                        koyubej: '#EBE4D5',
                        siyah: '#2B2B2B',
                        softBej: '#D8C3A5',
                        softPembe: '#F4D7D4',
                        softSari: '#F7E7C4',
                        softYesil: '#C9D6C4',
                        softMavi: '#C4D4E3'
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F6F0; font-family: 'Inter', sans-serif; color: #2B2B2B; overflow: hidden; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        
        .keten-doku {
            background-image: opacity(0.15), linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 3px 3px;
            background-blend-mode: overlay;
        }

        .gold-isleme {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.15);
        }

        .kitap-sahnesi { perspective: 2000px; }
        .defter-3d {
            width: 460px;
            height: 620px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .kapak-on {
            position: absolute; width: 100%; height: 100%;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; backface-visibility: hidden;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.12);
        }

        .acik .defter-3d { transform: rotateY(0deg); }
        .acik .kapak-on { transform: rotateY(-160deg); }
        .acik .kitap-ic-sayfalar { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        .kitap-ic-sayfalar {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 95vw; max-w: 1200px; height: 88vh; display: flex;
            opacity: 0; pointer-events: none; transition: all 0.8s ease-in-out; z-index: 20;
            box-shadow: 0 30px 70px rgba(0,0,0,0.18);
        }
        .sol-sayfa { border-top-left-radius: 12px; border-bottom-left-radius: 12px; background: linear-gradient(to right, #FCFAF5 96%, #E2DACB 100%); }
        .sag-sayfa { border-top-right-radius: 12px; border-bottom-right-radius: 12px; background: linear-gradient(to left, #FCFAF5 96%, #E2DACB 100%); }
        
        .sablon-tablo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 11px; font-weight: 300; }
        .sablon-tablo td, .sablon-tablo th { border: 1px solid #EBE4D5; padding: 4px 6px; text-align: left; }
        .sablon-tablo th { background-color: #F5F0E6; font-weight: 400; }
        
        .kesif-kutusu { background: rgba(245, 240, 230, 0.35); border: 1px dashed #EBE4D5; padding: 12px; border-radius: 6px; }

@media (max-width: 768px) {
    .kitap-ic-sayfalar {
        flex-direction: column !important; /* Mobilde de yan yana ama biz sadece birini göstereceğiz */
        width: 100vw !important;
        height: 100vh !important;
        transform: none !important;
        top: 0 !important;
        left: 0 !important;
        border-radius: 0 !important;
        overflow: hidden !important;
    }
    .sol-sayfa, .sag-sayfa {
        flex: 0 0 100vw !important; /* Her sayfa tam ekran */
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
    }
}

/* Masaüstü (768px üzeri) için varsayılan flex yapısının korunduğundan emin olun */
@media (min-width: 769px) {
    .kitap-ic-sayfalar { display: flex !important; flex-direction: row !important; }
    .sol-sayfa, .sag-sayfa { flex: 1 !important; display: flex !important; }
}
   
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

<div class="mb-4 flex gap-2">
    <button onclick="googleGirisYap()" class="px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">
        Google ile Giriş
    </button>
    <button onclick="cikisYap()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
        Çıkış
    </button>
</div>
    <!-- ÜST RENK PALETİ -->
    <div id="renk-paneli" class="mb-6 flex space-x-3 bg-transparent px-5 py-2 rounded-full border border-koyubej shadow-sm z-50 transition-opacity duration-500">
        <span class="text-xs font-light text-gray-500 self-center mr-2">Kapak Rengi:</span>
        <button onclick="changeCoverColor('#D8C3A5')" class="w-5 h-5 rounded-full bg-[#D8C3A5] border border-black/10"></button>
        <button onclick="changeCoverColor('#F4D7D4')" class="w-5 h-5 rounded-full bg-[#F4D7D4] border border-black/10"></button>
        <button onclick="changeCoverColor('#F7E7C4')" class="w-5 h-5 rounded-full bg-[#F7E7C4] border border-black/10"></button>
        <button onclick="changeCoverColor('#C9D6C4')" class="w-5 h-5 rounded-full bg-[#C9D6C4] border border-black/10"></button>
        <button onclick="changeCoverColor('#C4D4E3')" class="w-5 h-5 rounded-full bg-[#C4D4E3] border border-black/10"></button>

    </div>

    <!-- 3D SAHNE -->
    <div id="sahne" class="kitap-sahnesi w-full flex items-center justify-center relative">
        
        <!-- KAPALI DEFTER -->
        <div id="defter" class="defter-3d cursor-pointer" onclick="openNotebook()">
            <div id="kapakOn" class="kapak-on keten-doku bg-softBej rounded-r-2xl border-l-8 border-black/10 flex flex-col items-center justify-center p-10">
                <div class="border-2 border-[#BF953F]/40 p-8 rounded-xl text-center max-w-[320px] bg-white/5 backdrop-blur-sm shadow-inner">
                    <h1 id="kapakBasligi" contenteditable="true" onclick="event.stopPropagation()" class="gold-isleme serif-title text-4xl tracking-widest uppercase font-medium focus:outline-none">THE DIARY</h1>
                    <p id="kapakAltBasligi" contenteditable="true" onclick="event.stopPropagation()" class="text-[10px] tracking-widest text-[#BF953F] uppercase mt-3 focus:outline-none font-light">90 DAYS OF GLOW UP</p>
                </div>
            </div>
            <div class="absolute w-full h-full bg-stone-200 rounded-r-2xl shadow-inner transform translate-z-[-2px]"></div>
        </div>

        <!-- SAĞ VE SOL OK NAVİGASYONU -->
        <button onclick="prevPage()" id="solOk" class="absolute left-4 md:left-12 bg-white/60 hover:bg-white text-siyah w-12 h-12 rounded-full flex items-center justify-center shadow-md border border-koyubej transition-all opacity-0 pointer-events-none z-50 text-xl font-light">←</button>
        <button onclick="nextPage()" id="sagOk" class="absolute right-4 md:right-12 bg-white/60 hover:bg-white text-siyah w-12 h-12 rounded-full flex items-center justify-center shadow-md border border-koyubej transition-all opacity-0 pointer-events-none z-50 text-xl font-light">→</button>

        <!-- 📖 DEFTERİN İÇİ -->
        <div id="icSayfalar" class="kitap-ic-sayfalar bg-krem rounded-xl">
            
            <!-- 📄 SOL SAYFA -->
            <div class="sol-sayfa w-1/2 p-12 flex flex-col justify-between overflow-y-auto">
                <div class="space-y-6">
                    <div class="border-b border-stone-200 pb-3 flex justify-between items-end">
                        <h2 id="ustBaslikSol" contenteditable="true" class="serif-title text-3xl italic text-siyah focus:outline-none">Sol Sayfa Başlığı</h2>
                        <span id="sayfaNoSol" class="text-[11px] text-gray-400 font-light uppercase tracking-wider">S. 1</span>
                    </div>
                    <div id="editorSol" contenteditable="true" class="min-h-[300px] focus:outline-none font-light text-sm leading-relaxed text-siyah tracking-wide"></div>
                    <div class="pt-4 border-t border-dashed border-stone-200">
                        <label class="text-xs font-light text-gray-400 cursor-pointer hover:text-siyah transition flex items-center space-x-2">
                            <span>🖼️ Fotoğraf Ekle / Kaldır</span>
                            <input type="file" accept="image/*" class="hidden" onchange="uploadMultipleImages(this, 'galeriSol')">
                        </label>
                        <div id="galeriSol" class="flex flex-wrap gap-3 mt-4"></div>
                    </div>
                </div>
                <button onclick="closeNotebook(event)" class="text-xs font-light text-gray-400 hover:text-siyah transition text-left mt-8">← Kapat & Kilitle</button>
            </div>

            <!-- 📄 SAĞ SAYFA -->
            <div class="sag-sayfa w-1/2 p-12 flex flex-col justify-between overflow-y-auto">
                <div class="space-y-6">
                    <div class="border-b border-stone-200 pb-3 flex justify-between items-end">
                        <h2 id="ustBaslikSag" contenteditable="true" class="serif-title text-3xl italic text-siyah focus:outline-none">Sağ Sayfa Başlığı</h2>
                        <span id="sayfaNoSag" class="text-[11px] text-gray-400 font-light uppercase tracking-wider">S. 2</span>
                    </div>
                    <div id="editorSag" contenteditable="true" class="min-h-[300px] focus:outline-none font-light text-sm leading-relaxed text-siyah tracking-wide"></div>
                    <div class="pt-4 border-t border-dashed border-stone-200">
                        <label class="text-xs font-light text-gray-400 cursor-pointer hover:text-siyah transition flex items-center space-x-2">
                            <span>🖼️ Fotoğraf Ekle / Kaldır</span>
                            <input type="file" accept="image/*" class="hidden" onchange="uploadMultipleImages(this, 'galeriSag')">
                        </label>
                        <div id="galeriSag" class="flex flex-wrap gap-3 mt-4"></div>
                    </div>
                </div>

                <!-- BÖLÜM NAVİGASYONU -->
                <div class="mt-12 pt-4 border-t border-stone-200">
                    <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-2 font-medium">Bölümler:</p>
                    <div class="flex flex-wrap gap-1 text-[10px]">
                        <button onclick="jumpToCilt(1)" class="cilt-btn px-2 py-0.5 bg-siyah text-krem rounded font-light">C1</button>
                        <button onclick="jumpToCilt(2)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C2</button>
                        <button onclick="jumpToCilt(3)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C3</button>
                        <button onclick="jumpToCilt(4)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C4</button>
                        <button onclick="jumpToCilt(5)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C5</button>
                        <button onclick="jumpToCilt(6)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C6</button>
                        <button onclick="jumpToCilt(7)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C7</button>
                        <button onclick="jumpToCilt(8)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C8</button>
                        <button onclick="jumpToCilt(9)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C9</button>
                        <button onclick="jumpToCilt(10)" class="cilt-btn px-2 py-0.5 bg-bej text-gray-600 rounded font-light">C10</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentPagePair = 1;
        const maxPagePairs = 150;
        const ciltBasiSayfalari = { 1:1, 2:31, 3:61, 4:91, 5:121, 6:151, 7:181, 8:211, 9:241, 10:271 };

        function openNotebook() {
            document.getElementById("sahne").classList.add("acik");
            document.getElementById("renk-paneli").classList.add("opacity-0", "pointer-events-none");
            document.getElementById("solOk").classList.remove("opacity-0", "pointer-events-none");
            document.getElementById("sagOk").classList.remove("opacity-0", "pointer-events-none");
            loadPageContent();
            loadKapakData();
        } document.getElementById("kapakBasligi").addEventListener("input", saveKapakData);
document.getElementById("kapakAltBasligi").addEventListener("input", saveKapakData);

        function closeNotebook(event) {
            event.stopPropagation();
            savePageContent();
            saveKapakData();
            document.getElementById("sahne").classList.remove("acik");
            document.getElementById("renk-paneli").classList.remove("opacity-0", "pointer-events-none");
            document.getElementById("solOk").classList.add("opacity-0", "pointer-events-none");
            document.getElementById("sagOk").classList.add("opacity-0", "pointer-events-none");
        }

       function changeCoverColor(colorHex) {
    // Kapağın rengini anında değiştir
    document.getElementById("kapakOn").style.backgroundColor = colorHex;
    
    // Rengi tarayıcı hafızasına kalıcı olarak yaz
    localStorage.setItem("kapakRengi", colorHex);
}

        // KUSURSUZ SIRALI HAFTALIK VE GÜNLÜK AKIŞ MOTORU (Döngü = 12 Sayfa)
        function getTemplateForPage(pNum) {
            // İlk sayfa her zaman genel bir açılış/vizyon sayfası olsun
            if (pNum === 1) {
                return `✨ Büyük Planlayıcı & Dönüşüm Odakları<br><br><b>Bu Dönemin Büyük Hedefi:</b> <br><b>Mottolarım:</b><br>1. <br>2.`;
            }

            // Döngü hesabı (Her hafta tam 12 sayfa kaplar: 1 Plan + 4 Keşif + 7 Günlük)
            let adjustedNum = pNum - 1; 
            let relativePage = (adjustedNum % 12) + 1;
            let weekCount = Math.floor(adjustedNum / 12) + 1;

            // 1. HAFTALIK PLANLAYICI
            if (relativePage === 1) {
                return `🗓️ Hafta ${weekCount} | Strateji & Öncelikler<br><br><b>Bu Haftanın Ana Hedefleri:</b><br>- <br>- <br><br><b>Unutulmaması Gerekenler:</b>`;
            }

            // 2. HAFTALIK KEŞİF SAYFALARI (TAM 4 SAYFA - AYRI AYRI)
            if (relativePage === 2) {
                return `📚 Hafta ${weekCount} | Okuma Listesi & Kitap Günlüğü<br><br><div class="kesif-kutusu"><b>Okunan Kitap:</b> <br><b>Yazar:</b> <br><br><b>Günün Altını Çizdiğim İlham Verici Cümlesi:</b> </div>`;
            }
            if (relativePage === 3) {
                return `🎬 Hafta ${weekCount} | IMDb Görülmesi Gerekenler & Film Günlüğü<br><br><div class="kesif-kutusu"><b>İzlenen Film / Dizi:</b> <br><b>Benim Puanım:</b> ⭐⭐⭐⭐⭐<br><br><b>Kritik, Analiz & Eleştiri Notları:</b> </div>`;
            }
            if (relativePage === 4) {
                return `🏛️ Hafta ${weekCount} | İstanbul Kültür Rotası (Müze, Sergi, Tiyatro)<br><br><div class="kesif-kutusu"><b>Gidilen Etkinlik / Mekan:</b> <br><b>Rota & Lokasyon:</b> <br><br><b>Sanatsal İzlenimlerim:</b> </div>`;
            }
            if (relativePage === 5) {
                return `🎵 Hafta ${weekCount} | Haftanın Keşif Şarkıları & Kafe Listesi<br><br><div class="kesif-kutusu"><b>Keşfedilen Melodiler / Soundlar:</b> <br><br><b>Haftanın Yeni Nesil Kafe Durağı:</b> </div>`;
            }

            // 3. 7 GÜNLÜK PLAN VE RUTİNLER SAYFALARI
            let dayIndex = relativePage - 5; // 1'den 7'ye gün indeksi
            return `📅 Hafta ${weekCount} / Gün ${dayIndex} | Günlük Akış & Journaling<br><br>Bugün harika hissettiren anlar...<br><br>
            <div class="mt-4 pt-3 border-t border-stone-200/60">
                <p class="text-[11px] font-semibold text-stone-500 mb-1 uppercase tracking-wider">🌿 Günlük Rutinler & Bütünsel Takip Paneli</p>
                <table class="sablon-tablo">
                    <tr>
                        <th class="w-1/3">🥦 Günlük Beslenme Planı</th>
                        <th class="w-1/3">🧴 Cilt, Saç & Bakım Rutini</th>
                        <th class="w-1/3">💪 Spor & Egzersiz Tablosu</th>
                    </tr>
                    <tr>
                        <td class="align-top text-[10px]">
                            <b>Sabah:</b> <br>
                            <b>Öğle:</b> <br>
                            <b>Akşam:</b> 
                        </td>
                        <td class="align-top text-[10px]">
                            [ ] Cilt (Sabah)<br>
                            [ ] Cilt (Akşam)<br>
                            [ ] Saç / Vücut Maskesi
                        </td>
                        <td class="align-top text-[10px]">
                            <b>Rutinim:</b> <br><br>
                            <b>Esneme:</b> [ ]
                        </td>
                    </tr>
                    <tr>
                        <th colspan="2">👗 Günün Kombin Planı (Üst / Alt / Detaylar)</th>
                        <th>💧 Su İçme Takibi</th>
                    </tr>
                    <tr>
                        <td colspan="2" class="text-[10px] italic">Günün stili: </td>
                        <td class="text-center font-medium text-xs py-2 text-blue-500">💧 💧 💧 💧 💧 💧 💧 💧</td>
                    </tr>
                </table>
            </div>`;
        }

        function nextPage() {
            if (currentPagePair < maxPagePairs) {
                savePageContent();
                currentPagePair++;
                loadPageContent();
            }
        }

        function prevPage() {
            if (currentPagePair > 1) {
                savePageContent();
                currentPagePair--;
                loadPageContent();
            }
        }

        function jumpToCilt(ciltNum) {
            savePageContent();
            let targetPage = ciltBasiSayfalari[ciltNum];
            currentPagePair = Math.ceil(targetPage / 2);
            loadPageContent();
        }

        function uploadMultipleImages(input, galeriId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const galeri = document.getElementById(galeriId);
                    const imgId = 'img_' + Date.now();
                    
                    const container = document.createElement('div');
                    container.className = "relative inline-block group w-20 h-20 border border-stone-200 rounded overflow-hidden shadow-sm";
                    container.id = imgId;
                    container.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover">
                        <button onclick="deleteMultipleImage('${galeriId}', '${imgId}')" class="absolute top-0.5 right-0.5 bg-siyah/80 hover:bg-siyah text-krem text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center transition opacity-0 group-hover:opacity-100">✕</button>
                    `;
                    galeri.appendChild(container);
                    savePageContent();
                }
                reader.readAsDataURL(file);
            }
        }

        function deleteMultipleImage(galeriId, imgId) {
            document.getElementById(imgId).remove();
            savePageContent();
        }

        function saveKapakData() {
            localStorage.setItem("kapak_baslik", document.getElementById("kapakBasligi").innerHTML);
            localStorage.setItem("kapak_alt_baslik", document.getElementById("kapakAltBasligi").innerHTML);
            
        }

        function loadKapakData() {
            if(localStorage.getItem("kapak_baslik")) document.getElementById("kapakBasligi").innerHTML = localStorage.getItem("kapak_baslik");
            if(localStorage.getItem("kapak_alt_baslik")) document.getElementById("kapakAltBasligi").innerHTML = localStorage.getItem("kapak_alt_baslik");
        }

       async function savePageContent() {
    let pSol = (currentPagePair * 2) - 1;
    let pSag = currentPagePair * 2;

    // 1. Önce her zamanki gibi local'e yedekle (hızlı erişim için)
    localStorage.setItem(`p_${pSol}_title`, document.getElementById("ustBaslikSol").innerHTML);
    localStorage.setItem(`p_${pSol}_text`, document.getElementById("editorSol").innerHTML);
    localStorage.setItem(`p_${pSol}_galeri`, document.getElementById("galeriSol").innerHTML);

    localStorage.setItem(`p_${pSag}_title`, document.getElementById("ustBaslikSag").innerHTML);
    localStorage.setItem(`p_${pSag}_text`, document.getElementById("editorSag").innerHTML);
    localStorage.setItem(`p_${pSag}_galeri`, document.getElementById("galeriSag").innerHTML);

    // 2. EĞER KULLANICI GİRİŞ YAPTIYSA FİREBASE'E GÖNDER
    if (window.currentUser) {
        try {
            // Firestore işlemleri için gereken fonksiyonları tanımlıyoruz
            const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
            
            // Kullanıcının ID'sine özel bir klasör (document) oluşturuyoruz
            const docRef = doc(window.firebaseDB, "users", window.currentUser.uid, "pages", "page_pair_" + currentPagePair);
            
            await setDoc(docRef, {
                pSol_title: document.getElementById("ustBaslikSol").innerHTML,
                pSol_text: document.getElementById("editorSol").innerHTML,
                pSol_galeri: document.getElementById("galeriSol").innerHTML,
                pSag_title: document.getElementById("ustBaslikSag").innerHTML,
                pSag_text: document.getElementById("editorSag").innerHTML,
                pSag_galeri: document.getElementById("galeriSag").innerHTML,
                updatedAt: new Date()
            });
            
            console.log("Veri Firebase'e başarıyla kaydedildi!");
        } catch (error) {
            console.error("Firebase'e kayıt sırasında hata:", error);
        }
    }
}

      async function loadPageContent() {
    let pSol = (currentPagePair * 2) - 1;
    let pSag = currentPagePair * 2;

    document.getElementById("sayfaNoSol").innerText = `S. ${pSol}`;
    document.getElementById("sayfaNoSag").innerText = `S. ${pSag}`;

    // 1. ÖNCE FİREBASE'DEN KONTROL ET (Kullanıcı giriş yaptıysa)
    if (window.currentUser) {
        try {
            const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
            const docRef = doc(window.firebaseDB, "users", window.currentUser.uid, "pages", "page_pair_" + currentPagePair);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("ustBaslikSol").innerHTML = data.pSol_title;
                document.getElementById("editorSol").innerHTML = data.pSol_text;
                document.getElementById("galeriSol").innerHTML = data.pSol_galeri || "";
                
                document.getElementById("ustBaslikSag").innerHTML = data.pSag_title;
                document.getElementById("editorSag").innerHTML = data.pSag_text;

                console.log("Veriler Firebase'den yüklendi.");

            }
        } catch (e) { console.error("Firebase yükleme hatası:", e); }
    }

    document.getElementById("ustBaslikSol").innerHTML = localStorage.getItem(`p_${pSol}_title`) || `Glow Up Journey`;

// Verileri bir dosyaya indirme
function exportData() {
    const data = JSON.stringify(localStorage);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'defterim_yedek.json';
    a.click();
}

// Dosyadan verileri geri yükleme
function importData(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const content = JSON.parse(e.target.result);
        for (let key in content) {
            localStorage.setItem(key, content[key]);
        }
        location.reload(); // Sayfayı yenileyerek verileri göster
    };
    reader.readAsText(file);
}
